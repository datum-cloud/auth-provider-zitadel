apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: serviceaccountkey-lifecycle
spec:
  # This test verifies the ServiceAccountKey lifecycle (create, list, delete, verify missing).
  # 1. Create a ServiceAccount (Active).
  # 2. Create two ServiceAccountKeys for it.
  # 3. List the keys, verify both are present.
  # 4. Delete one of the keys.
  # 5. List the keys again, verify only the second key remains.
  steps:
  - name: create-resources
    try:
    - apply:
        file: resources/serviceaccount.yaml
    - assert:
        resource:
          apiVersion: iam.miloapis.com/v1alpha1
          kind: ServiceAccount
          metadata:
            name: sa-keys
          status:
            state: Active
            conditions:
            - type: Ready
              status: "True"
    - script:
        content: |
          set -e

          # The Zitadel username is the computed email: {name}@single.identity.miloapis.com
          SA_UID=$(kubectl get serviceaccounts.iam.miloapis.com sa-keys -o jsonpath='{.metadata.uid}')
          SA_USERNAME="sa-keys@single.identity.miloapis.com"
          echo "$SA_USERNAME" > /tmp/sa_username.txt

          # Create Key 1
          openssl genrsa -out /tmp/key1-priv.pem 2048 2>/dev/null
          openssl rsa -in /tmp/key1-priv.pem -pubout -out /tmp/key1-pub.pem 2>/dev/null
          KEY1_PUB_KEY=$(cat /tmp/key1-pub.pem)

          POST_RESPONSE_1=$(jq -n \
            --arg serviceAccountUserName "$SA_USERNAME" \
            --arg publicKey "$KEY1_PUB_KEY" \
            '{apiVersion:"identity.miloapis.com/v1alpha1",kind:"ServiceAccountKey",metadata:{name:"key1-sa-keys"},spec:{serviceAccountUserName:$serviceAccountUserName,publicKey:$publicKey}}' | \
            curl -s -X POST "http://localhost:8001/apis/identity.miloapis.com/v1alpha1/serviceaccountkeys" \
              -H "Content-Type: application/json" \
              -H "Impersonate-User: system:admin" \
              -H "Impersonate-Group: system:masters" \
              -H "Impersonate-Extra-project: single" \
              -d @-)

          KEY1_ID=$(printf '%s\n' "$POST_RESPONSE_1" | jq -r '.status.authProviderKeyID')
          if [ -z "$KEY1_ID" ] || [ "$KEY1_ID" == "null" ]; then
            echo "ERROR: Failed to extract KEY1_ID from response:"
            printf '%s\n' "$POST_RESPONSE_1"
            exit 1
          fi
          echo "KEY1_ID: $KEY1_ID"
          echo "$KEY1_ID" > /tmp/key1_id.txt

          # Create Key 2
          openssl genrsa -out /tmp/key2-priv.pem 2048 2>/dev/null
          openssl rsa -in /tmp/key2-priv.pem -pubout -out /tmp/key2-pub.pem 2>/dev/null
          KEY2_PUB_KEY=$(cat /tmp/key2-pub.pem)

          POST_RESPONSE_2=$(jq -n \
            --arg serviceAccountUserName "$SA_USERNAME" \
            --arg publicKey "$KEY2_PUB_KEY" \
            '{apiVersion:"identity.miloapis.com/v1alpha1",kind:"ServiceAccountKey",metadata:{name:"key2-sa-keys"},spec:{serviceAccountUserName:$serviceAccountUserName,publicKey:$publicKey}}' | \
            curl -s -X POST "http://localhost:8001/apis/identity.miloapis.com/v1alpha1/serviceaccountkeys" \
              -H "Content-Type: application/json" \
              -H "Impersonate-User: system:admin" \
              -H "Impersonate-Group: system:masters" \
              -H "Impersonate-Extra-project: single" \
              -d @-)

          KEY2_ID=$(printf '%s\n' "$POST_RESPONSE_2" | jq -r '.status.authProviderKeyID')
          if [ -z "$KEY2_ID" ] || [ "$KEY2_ID" == "null" ]; then
            echo "ERROR: Failed to extract KEY2_ID from response:"
            printf '%s\n' "$POST_RESPONSE_2"
            exit 1
          fi
          echo "KEY2_ID: $KEY2_ID"
          echo "$KEY2_ID" > /tmp/key2_id.txt

  - name: list-and-verify-two-keys
    try:
    - script:
        content: |
          set -e
          SA_USERNAME=$(cat /tmp/sa_username.txt)

          LIST_RESPONSE=$(curl -s -G "http://localhost:8001/apis/identity.miloapis.com/v1alpha1/serviceaccountkeys" \
            --data-urlencode "fieldSelector=spec.serviceAccountUserName=${SA_USERNAME}" \
            -H "Impersonate-User: system:admin" \
            -H "Impersonate-Group: system:masters" \
            -H "Impersonate-Extra-project: single")

          ITEMS_COUNT=$(printf '%s\n' "$LIST_RESPONSE" | jq '.items | length')
          if [ "$ITEMS_COUNT" -ne 2 ]; then
            echo "ERROR: Expected 2 keys, got $ITEMS_COUNT! Response:"
            printf '%s\n' "$LIST_RESPONSE"
            exit 1
          fi
          echo "Successfully verified 2 keys are present for $SA_USERNAME."

  - name: delete-one-key
    try:
    - script:
        content: |
          set -e
          KEY1_ID=$(cat /tmp/key1_id.txt)

          # Delete Key 1. Target resource name is the keyID
          DELETE_RESPONSE=$(curl -s -X DELETE "http://localhost:8001/apis/identity.miloapis.com/v1alpha1/serviceaccountkeys/${KEY1_ID}" \
            -H "Impersonate-User: system:admin" \
            -H "Impersonate-Group: system:masters" \
            -H "Impersonate-Extra-project: single")

          echo "Successfully requested deletion of Key 1 (${KEY1_ID}). REST Response:"
          printf '%s\n' "$DELETE_RESPONSE"

  - name: list-and-verify-one-key-remaining
    try:
    - script:
        content: |
          set -e
          SA_USERNAME=$(cat /tmp/sa_username.txt)
          KEY2_ID=$(cat /tmp/key2_id.txt)

          LIST_RESPONSE=$(curl -s -G "http://localhost:8001/apis/identity.miloapis.com/v1alpha1/serviceaccountkeys" \
            --data-urlencode "fieldSelector=spec.serviceAccountUserName=${SA_USERNAME}" \
            -H "Impersonate-User: system:admin" \
            -H "Impersonate-Group: system:masters" \
            -H "Impersonate-Extra-project: single")

          ITEMS_COUNT=$(printf '%s\n' "$LIST_RESPONSE" | jq '.items | length')
          if [ "$ITEMS_COUNT" -ne 1 ]; then
            echo "ERROR: Expected 1 key, got $ITEMS_COUNT! Response:"
            printf '%s\n' "$LIST_RESPONSE"
            exit 1
          fi

          REMAINING_ID=$(printf '%s\n' "$LIST_RESPONSE" | jq -r '.items[0].status.authProviderKeyID')
          if [ "$REMAINING_ID" != "$KEY2_ID" ]; then
             echo "ERROR: Expected remaining key to be $KEY2_ID, but got $REMAINING_ID"
             exit 1
          fi

          echo "Successfully verified 1 key is remaining ($KEY2_ID)."
