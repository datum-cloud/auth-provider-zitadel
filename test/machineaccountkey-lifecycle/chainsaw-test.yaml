apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: machineaccount-deactivation
spec:
  # This test verifies that deactivating a MachineAccount prevents its keys from working.
  # 1. Create a MachineAccount (Active) and a MachineAccountKey.
  # 2. Verify an access token can be obtained.
  # 3. Deactivate the MachineAccount (state: Inactive).
  # 4. Verify getting an access token fails.
  # 5. Re-activate the MachineAccount (state: Active).
  # 6. Verify getting an access token works again.
  steps:
  - name: create-resources
    try:
    - apply:
        file: resources/machineaccount.yaml
    - assert:
        resource:
          apiVersion: iam.miloapis.com/v1alpha1
          kind: MachineAccount
          metadata:
            name: deactivation-ma
          status:
            state: Active
            email: deactivation-ma@single.identity.miloapis.com
            conditions:
            - type: Ready
              status: "True"
    - script:
        content: |
          set -e

          # Generate RSA key pair
          openssl genrsa -out /tmp/deact-priv.pem 2048 2>/dev/null
          openssl rsa -in /tmp/deact-priv.pem -pubout -out /tmp/deact-pub.pem 2>/dev/null

          # The Zitadel username is the computed email: {name}@single.identity.miloapis.com
          MA_UID=$(kubectl get machineaccount deactivation-ma -n "$NAMESPACE" -o jsonpath='{.metadata.uid}')
          MA_USERNAME="deactivation-ma@single.identity.miloapis.com"

          # Create the key via identity.miloapis.com, providing our own public key
          PUB_KEY=$(cat /tmp/deact-pub.pem)
          POST_RESPONSE=$(jq -n \
            --arg machineAccountUserName "$MA_USERNAME" \
            --arg publicKey "$PUB_KEY" \
            '{apiVersion:"identity.miloapis.com/v1alpha1",kind:"MachineAccountKey",metadata:{name:"deact-key"},spec:{machineAccountUserName:$machineAccountUserName,publicKey:$publicKey}}' | \
            curl -s -X POST "http://localhost:8001/apis/identity.miloapis.com/v1alpha1/machineaccountkeys" \
              -H "Content-Type: application/json" \
              -H "Impersonate-User: system:admin" \
              -H "Impersonate-Group: system:masters" \
              -H "Impersonate-Extra-project: single" \
              -d @-)

          # Extract authProviderKeyID from the response status
          printf '%s\n' "$POST_RESPONSE"
          KEY_ID=$(printf '%s\n' "$POST_RESPONSE" | jq -r '.status.authProviderKeyID')
          if [ -z "$KEY_ID" ] || [ "$KEY_ID" == "null" ]; then
            echo "ERROR: Failed to extract authProviderKeyID. Response: $POST_RESPONSE"
            exit 1
          fi
          echo "KEY_ID: $KEY_ID"

          # Build zitadel-tools key JSON using our own private key
          PRIV_KEY=$(cat /tmp/deact-priv.pem)
          jq -n \
            --arg keyId "$KEY_ID" \
            --arg userId "$MA_UID" \
            --arg key "$PRIV_KEY" \
            '{type:"serviceaccount",keyId:$keyId,key:$key,userId:$userId}' > /tmp/zitadel-key-deact.json
          echo "Saved zitadel key JSON"

  - name: verify-key-works
    try:
    - script:
        content: |
          set -e
          # Use zitadel-tools to generate JWT profile from the saved key JSON
          ../../bin/zitadel-tools key2jwt \
            --audience="https://zitadel.zitadel-system.svc.cluster.local" \
            --key="/tmp/zitadel-key-deact.json" > /tmp/jwt-deact.token

          # Get access token from ZITADEL
          RESPONSE=$(curl -k -s -X POST "$ZITADEL_DOMAIN/oauth/v2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Host: zitadel.zitadel-system.svc.cluster.local" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            --data-urlencode "scope=urn:zitadel:iam:org:project:id:zitadel:aud" \
            --data-urlencode "assertion=$(cat /tmp/jwt-deact.token)")

          ACCESS_TOKEN=$(printf '%s\n' "$RESPONSE" | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" == "null" ]; then
            echo "ERROR: Failed to obtain access token before deactivation. Response: $RESPONSE"
            exit 1
          fi
          echo "Successfully obtained access token before deactivation!"

  - name: deactivate-machine-account
    try:
    - patch:
        resource:
          apiVersion: iam.miloapis.com/v1alpha1
          kind: MachineAccount
          metadata:
            name: deactivation-ma
          spec:
            state: Inactive
    - assert:
        resource:
          apiVersion: iam.miloapis.com/v1alpha1
          kind: MachineAccount
          metadata:
            name: deactivation-ma
          status:
            state: Inactive
            conditions:
            - type: Ready
              status: "True"

  - name: verify-token-fails-when-deactivated
    timeouts:
      exec: 20s
    try:
    - script:
        content: |
          set -e
          # Wait a bit for ZITADEL to process the deactivation
          sleep 5

          RESPONSE=$(curl -k -s -X POST "$ZITADEL_DOMAIN/oauth/v2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Host: zitadel.zitadel-system.svc.cluster.local" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            --data-urlencode "scope=urn:zitadel:iam:org:project:id:zitadel:aud" \
            --data-urlencode "assertion=$(cat /tmp/jwt-deact.token)")

          ERROR=$(printf '%s\n' "$RESPONSE" | jq -r '.error')
          if [ "$ERROR" == "null" ] || [ -z "$ERROR" ]; then
            echo "ERROR: Access token exchange did not fail as expected when deactivated! Response: $RESPONSE"
            exit 1
          fi
          echo "Success: Token correctly failed when machine account was deactivated (Error: $ERROR)"

  - name: reactivate-machine-account
    try:
    - patch:
        resource:
          apiVersion: iam.miloapis.com/v1alpha1
          kind: MachineAccount
          metadata:
            name: deactivation-ma
          spec:
            state: Active
    - assert:
        resource:
          apiVersion: iam.miloapis.com/v1alpha1
          kind: MachineAccount
          metadata:
            name: deactivation-ma
          status:
            state: Active
            conditions:
            - type: Ready
              status: "True"

  - name: verify-token-works-after-reactivation
    timeouts:
      exec: 20s
    try:
    - script:
        content: |
          set -e
          # Wait a bit for ZITADEL to process the reactivation
          sleep 5

          RESPONSE=$(curl -k -s -X POST "$ZITADEL_DOMAIN/oauth/v2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Host: zitadel.zitadel-system.svc.cluster.local" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            --data-urlencode "scope=urn:zitadel:iam:org:project:id:zitadel:aud" \
            --data-urlencode "assertion=$(cat /tmp/jwt-deact.token)")

          ACCESS_TOKEN=$(printf '%s\n' "$RESPONSE" | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" == "null" ]; then
            echo "ERROR: Failed to obtain access token after reactivation. Response: $RESPONSE"
            exit 1
          fi
          echo "Successfully obtained access token again after reactivation!"

