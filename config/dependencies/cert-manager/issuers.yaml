apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ci-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ci-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: ci-ca
  secretName: ci-ca-secret
  issuerRef:
    name: ci-selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ci-ca-issuer
spec:
  ca:
    secretName: ci-ca-secret
