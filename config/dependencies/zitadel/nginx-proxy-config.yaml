apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-config
  namespace: zitadel-system
data:
  nginx.conf: |
    # Run as non-root: redirect all writable paths to /tmp
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path       /tmp/proxy_temp;
        fastcgi_temp_path     /tmp/fastcgi_temp;
        uwsgi_temp_path       /tmp/uwsgi_temp;
        scgi_temp_path        /tmp/scgi_temp;

        server {
            listen 9443 ssl;
            http2 on;
            server_name zitadel.zitadel-system.svc.cluster.local;

            ssl_certificate     /etc/zitadel/tls/tls.crt;
            ssl_certificate_key /etc/zitadel/tls/tls.key;

            # Route /ui/v2/login/* to the login UI service (HTTP, port 3000)
            location /ui/v2/login {
                proxy_pass         http://zitadel-login:3000;
                proxy_http_version 1.1;
                proxy_set_header   Host              zitadel.zitadel-system.svc.cluster.local;
                proxy_set_header   X-Forwarded-For   $remote_addr;
                proxy_set_header   X-Forwarded-Proto https;
            }

            # Route requests starting with /zitadel. to Zitadel via gRPC to preserve trailers
            # required for Connect RPC.
            location /zitadel. {
                grpc_pass         grpcs://127.0.0.1:8080;
                grpc_set_header   Host              zitadel.zitadel-system.svc.cluster.local;
                grpc_set_header   X-Forwarded-For   $remote_addr;
                grpc_set_header   X-Forwarded-Proto https;
                grpc_read_timeout 300s;
            }

            # Route everything else to Zitadel (HTTPS, port 8080).
            location / {
                proxy_pass         https://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_ssl_verify   off;
                proxy_set_header   Host              zitadel.zitadel-system.svc.cluster.local;
                proxy_set_header   X-Forwarded-For   $remote_addr;
                proxy_set_header   X-Forwarded-Proto https;
                proxy_read_timeout 300s;
            }
        }
    }
