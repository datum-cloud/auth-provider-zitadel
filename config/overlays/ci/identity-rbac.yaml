apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: identity-api-viewer
rules:
  - apiGroups: ["identity.miloapis.com"]
    resources: ["useridentities", "sessions"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: identity-api-viewer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: identity-api-viewer
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:unauthenticated
    apiGroup: rbac.authorization.k8s.io
